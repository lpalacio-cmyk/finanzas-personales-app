[theme]
base = "light"
primaryColor = "#102250"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#f7f8fb"
textColor = "#22263a"

[client]
toolbarMode = "minimal"
# Ante un error, el usuario ve un mensaje genérico en vez del traceback de
# Python. El detalle completo sigue visible en los logs (Manage app).
showErrorDetails = "none"
